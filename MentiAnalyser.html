async function verifyAndDecrypt(password) {
  try {
    const raw    = Uint8Array.from(atob(ENCRYPTED_KEY), c => c.charCodeAt(0));
    const salt   = raw.slice(0, 16);
    const iv     = raw.slice(16, 28);
    const cipher = raw.slice(28);
    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, cipher);
    const key = new TextDecoder().decode(decrypted);
    if (!key.startsWith('sk-')) return null;
    return key;
  } catch(e) {
    return null;
  }
}

const byTheme = (qs=[]) => {
  const map = {};
  qs.forEach(({ theme, correct, total, taux }) => {
    if (!map[theme]) map[theme] = { theme, correct:0, total:0, tauxSum:0, count:0 };
    map[theme].correct  += correct;
    map[theme].total    += total;
    map[theme].tauxSum  += (taux || 0);
    map[theme].count++;
  });
  return Object.values(map)
    .map(d => ({
      ...d,
      taux: d.total > 0
        ? Math.round(d.correct / d.total * 100)
        : (d.count > 0 ? Math.round(d.tauxSum / d.count) : 0)
    }))
    .sort((a, b) => a.taux - b.taux);
};

const globalScore = (qs=[]) => {
  const tot = qs.reduce((a,q) => a + q.total, 0);
  const cor = qs.reduce((a,q) => a + q.correct, 0);
  if (tot > 0) return Math.round(cor / tot * 100);
  if (qs.length > 0) return Math.round(qs.reduce((a,q) => a + (q.taux||0), 0) / qs.length);
  return 0;
};

// ── HELPER RTF : encoder uniquement les vrais caractères Unicode > 127
// Ne touche pas aux chaînes qui contiennent déjà des séquences \'xx
function rtfEncode(str) {
  return String(str).replace(/[^\x00-\x7E]/g, c => {
    const cp = c.charCodeAt(0);
    return cp < 256 ? `\\'${cp.toString(16).padStart(2,'0')}` : '';
  });
}

// ── HELPER RTF : ligne de tableau
// isHeader=true → fond bleu (index couleur 1 = #1e40af) + texte blanc (index 2)
function rtfRow(cells, widths, isHeader=false) {
  let pos = 0;
  const cellDefs = widths.map(w => {
    pos += w;
    // \clcbpat1 = couleur de fond = entrée n°1 de colortbl = bleu
    const shade = isHeader ? '\\clcbpat1' : '';
    return `\\clbrdrt\\brdrw15\\brdrs\\clbrdrl\\brdrw15\\brdrs\\clbrdrb\\brdrw15\\brdrs\\clbrdrr\\brdrw15\\brdrs${shade}\\cellx${pos}`;
  }).join('');
  const cellContents = cells.map(c => {
    const fmt = isHeader ? '\\b\\cf2 ' : '\\cf0 ';
    return `\\pard\\intbl\\sb40\\sa40\\sl276\\slmult1 ${fmt}\\fs20 ${rtfEncode(c)}\\b0\\cell`;
  }).join('\n');
  return `\\trowd\\trgaph108\\trrh-320\n${cellDefs}\n${cellContents}\n\\row\n\\pard`;
}

// ── EXPORT JSON ───────────────────────────────────────────────────────────────
function exportJSON(atelier, partenaire, animateur, participants, dateSession, qs, niveauPublic="") {
  const payload = { atelier, partenaire, animateur, participants, dateSession, niveauPublic, questions: qs,
    _version: 1, _exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const safe = (atelier||"Session").replace(/[^a-zA-Z0-9_\-]/g,'_').slice(0,40);
  a.href = url; a.download = `${safe}.json`;
  a.style.display = "none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

// ── IMPORT JSON ───────────────────────────────────────────────────────────────
function importJSON(file, callbacks) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.questions) || data.questions.length === 0)
        throw new Error("Fichier JSON invalide ou vide");
      callbacks.onSuccess(data);
    } catch(e) {
      alert("❌ Impossible de lire ce fichier JSON : " + e.message);
    }
  };
  reader.readAsText(file);
}

// ── EXPORT PDF AVEC SYNTHÈSE IA ───────────────────────────────────────────────
async function exportPDFAvecIA(atelier, partenaire, animateur, participants, dateSession, niveauPublic, qs, apiKey) {
  if (!apiKey) { alert("Clé API requise pour la synthèse IA."); return; }

  // Ouvrir la fenêtre AVANT le await — seul moyen d'éviter le blocage popup navigateur
  const win = window.open('', '_blank');
  if (!win) { alert("Autorisez les popups pour cet outil."); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Génération en cours…</title>
    <style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f8fafc;flex-direction:column;gap:16px}
    .spin{width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:s 0.8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}</style></head>
    <body><div class="spin"></div><p style="color:#64748b;font-size:14px">Génération de la synthèse IA…</p></body></html>`);
  win.document.close();

  const score  = globalScore(qs);
  const themes = byTheme(qs);
  const today  = dateSession || new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});

  const prompt = `Tu es conseiller numérique au Conseil Départemental du Lot-et-Garonne.
Rédige une synthèse professionnelle pour la direction d'un établissement scolaire.
Atelier : ${atelier} — ${partenaire} — ${today} — ${participants||'?'} participants — ${qs.length} questions.
${animateur?'Animé par : '+animateur+'.':''}
Score global : ${score}%
Résultats par thème :
${themes.map(t=>`- ${t.theme} : ${t.taux}% (${t.correct}/${t.total})`).join('\n')}
Points critiques (< 50%) : ${qs.filter(q=>q.taux<50).map(q=>`"${q.q}" : ${q.taux}%`).join(' | ')}
Parfaitement maîtrisés (100%) : ${qs.filter(q=>q.taux===100).map(q=>`"${q.q}"`).join(' | ')}
Rédige en français une synthèse structurée : 1.Contexte 2.Résultats globaux 3.Points forts 4.Lacunes 5.Recommandations 6.Conclusion
Ton sobre et institutionnel. Environ 400 mots. Pas de markdown. Texte pur avec titres numérotés.`;

  let narratif = "";
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,
        messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    if (!data.error) narratif = data.content?.map(b=>b.text||'').join('\n').trim() || "";
  } catch(e) {
    console.warn("IA indisponible:", e);
    narratif = "";
  }

  // Générer le HTML du PDF dans la fenêtre déjà ouverte
  exportPDF(atelier, partenaire, animateur, participants, dateSession, qs, niveauPublic, narratif, win);
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV(atelier, partenaire, qs=questions) {
  const safeName = (atelier||"Export").replace(/[^a-zA-Z0-9_\-]/g,'_').slice(0,40);
  const header = "id,question,theme,bonnes_reponses,total,taux,niveau\n";
  const rows = qs.map(q => {
    const niveau = q.taux>=80?"Acquis":q.taux>=60?"Fragile":"A renforcer";
    const esc = v => `"${String(v).replace(/"/g,'""')}"`;
    return [q.id, esc(q.q), esc(q.theme), q.correct, q.total, q.taux, esc(niveau)].join(',');
  }).join('\n');
  const bom  = '\uFEFF'; // UTF-8 BOM pour Excel
  const blob = new Blob([bom + header + rows], {type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `${safeName}.csv`;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

  const areinforcer = qs.filter(q=>q.taux<60).length;
  const scoreColor  = score>=80?"#16a34a":score>=60?"#d97706":"#dc2626";
  const scoreBg     = score>=80?"#f0fdf4":score>=60?"#fffbeb":"#fef2f2";

  // ── SVG barres horizontales par thème
  const BH=28, GAP=10, LBL=145, MAX_BAR=340, VAL=50;
  const svgH = themes.length*(BH+GAP);
  const themesBars = themes.map((t,i)=>{
    const y=i*(BH+GAP);
    const bw=Math.round(t.taux/100*MAX_BAR);
    const col=t.taux>=80?"#22c55e":t.taux>=60?"#f59e0b":"#ef4444";
    const bg=t.taux>=80?"#dcfce7":t.taux>=60?"#fef9c3":"#fee2e2";
    return `
      <rect x="0" y="${y}" width="${LBL+MAX_BAR+VAL}" height="${BH}" rx="6" fill="${bg}" opacity="0.5"/>
      <text x="${LBL-6}" y="${y+BH/2+4.5}" text-anchor="end" font-size="11.5" fill="#334155" font-family="Segoe UI,Arial,sans-serif">${t.theme}</text>

  }).join('');

  // ── SVG camembert répartition

  const pA=Math.round(acquis/total*100);
  const pF=Math.round(fragiles/total*100);

    const s=startPct/100*2*Math.PI-Math.PI/2;
    const e=endPct/100*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(s), y1=cy+r*Math.sin(s);

  }
  const pieSvg = pA+pF+pR>0 ? `
    ${svgArc(70,70,62,0,pA,"#22c55e")}
    ${svgArc(70,70,62,pA,pA+pF,"#f59e0b")}
    ${svgArc(70,70,62,pA+pF,100,"#ef4444")}

  // ── Tableau questions
  const qRows=[...qs].sort((a,b)=>a.taux-b.taux).map((q,i)=>{
    const col=q.taux>=80?"#16a34a":q.taux>=60?"#d97706":"#dc2626";

    const lbl=q.taux>=80?"✅ Acquis":q.taux>=60?"⚠️ Fragile":"🔴 À renforcer";

      <td style="padding:6px 8px;text-align:center;white-space:nowrap;font-size:10.5px;color:${col};font-weight:700">${lbl}</td>
    </tr>`;
  }).join('');

  // ── Listes points forts / axes
  const fortsItems=themes.filter(t=>t.taux>=80)
    .map(t=>`<li><strong>${t.theme}</strong> — ${t.taux}% de réussite</li>`).join('');
  const axesItems=themes.filter(t=>t.taux<60)
    .map(t=>`<li><strong>${t.theme}</strong> — ${t.taux}% · séance dédiée recommandée</li>`).join('');

    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  })
  .then(r => r.json())
  .then(data => {
    console.log('API response:', JSON.stringify(data));
    if (data.error) {
      alert('Erreur API : ' + data.error.type + ' — ' + data.error.message);
      return;
    }
    const raw = (data.content?.map(b=>b.text||'').join('\n') || '').trim();
    if (!raw) { alert('Réponse vide — voir console pour détails.'); return; }
    const text = raw.replace(/[^\x00-\x7E]/g, c => {
      const cp = c.charCodeAt(0);
      return cp < 256 ? `\\'${cp.toString(16).padStart(2,'0')}` : '';
    });
    const rtfBody = text.split('\n').map(l => {
      const t = l.trim();
      if (!t) return '\\par';
      if (/^\d+\./.test(t)) return `\\pard\\sb200\\sa60\\b\\fs22 ${t}\\b0\\par`;
      return `\\pard\\sb60\\sa60\\fs20 ${t}\\par`;
    }).join('\n');

    const h1   = rtfEncode(atelier || "Synthèse");
    const h2   = `${rtfEncode(partenaire||'')}  |  ${rtfEncode(today)}  |  ${nb} \\'e9l\\'e8ves`;
    const hAni = animateur ? `Anim\\'e9 par : \\b ${rtfEncode(animateur)}\\b0` : null;
    const foot = rtfEncode("Conseil Départemental du Lot-et-Garonne — Atelier médiation numérique");

    const rtf =
`{\\rtf1\\ansi\\ansicpg1252\\deff0
{\\fonttbl{\\f0\\froman\\fcharset0 Arial;}}
{\\colortbl ;\\red30\\green64\\blue175;\\red100\\green116\\blue139;}
\\paperw12240\\paperh15840\\margl1800\\margr1800\\margt1440\\margb1440\\f0\\widowctrl
{\\pard\\sb0\\sa120\\b\\fs34\\cf1 ${h1}\\b0\\par}
{\\pard\\sb0\\sa40\\fs18\\cf2 ${h2}\\par}
${hAni ? `{\\pard\\sb0\\sa40\\fs18\\cf2 ${hAni}\\par}` : ''}
{\\pard\\sb0\\sa40\\fs20\\cf2 Score global : \\b\\cf1 ${score}%\\b0\\cf2  de bonnes r\\'e9ponses\\par}
{\\pard\\sb0\\sa200\\fs8\\par}
${rtfBody}
{\\pard\\sb400\\sa0\\fs16\\cf2 ${foot}\\par}
}`;

    // Téléchargement — compatible Android/mobile
    const blob = new Blob([rtf], {type:"application/rtf"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    const safeName = (atelier || "Synthese").replace(/[^a-zA-Z0-9_\-]/g, '_').slice(0,40);
    const safePartner = (partenaire || "").replace(/[^a-zA-Z0-9_\-]/g, '_').slice(0,30);
    a.download = `Synthese_${safeName}${safePartner ? '_'+safePartner : ''}.rtf`;
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 1000);
  })
  .catch(err => alert("Erreur API : " + err.message));
}

// ── EXTRACTION IMAGES DEPUIS ZIP ──────────────────────────────────────────────
async function extractImagesFromZip(zipFile) {
  const zip = await JSZip.loadAsync(zipFile);
  const imageFiles = [];
  const imageExts = /\.(png|jpe?g)$/i;
  const promises = [];
  zip.forEach((relativePath, entry) => {
    if (!entry.dir && imageExts.test(relativePath)) {
      promises.push(
        entry.async("blob").then(blob => {
          const ext = relativePath.split('.').pop().toLowerCase();
          const mime = ext === "png" ? "image/png" : "image/jpeg";
          return new File([blob], relativePath.split('/').pop(), { type: mime });
        })
      );
    }
  });
  const extracted = await Promise.all(promises);
  return extracted;
}

const THEMES_CONNUS = ["Vie privée","Sécurité","Arnaques","Algorithmes","Publications","Jeux & inconnus","Cyberharcèlement","Cookies","Vocabulaire"];
const COUT_PAR_IMAGE = 0.0012; // € estimé par image (Haiku + vision)

async function fetchAvecRetry(url, options, maxRetries=3) {
  for (let attempt=1; attempt<=maxRetries; attempt++) {
    const resp = await fetch(url, options);
    if (resp.status === 429 || resp.status >= 500) {
      if (attempt === maxRetries) throw new Error(`HTTP ${resp.status} après ${maxRetries} tentatives`);
      await new Promise(r => setTimeout(r, 1000 * Math.pow(2, attempt-1)));
      continue;
    }
    return resp;
  }
}

async function analyserPNG(files, apiKey, setStatus, setProgress, setRetryInfo, setResults, setErrors, setQuestionsData, sourceContext="") {
  setStatus("loading");
  setProgress(0);
  setRetryInfo(null);
  const results = [];
  const errors  = [];
  const isMenti = !sourceContext.trim(); // mode Mentimeter si pas de description

  for (let i = 0; i < files.length; i++) {
    try {
      const isPDF = files[i].type === 'application/pdf' || files[i].name.toLowerCase().endsWith('.pdf');

      const b64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(files[i]);
      });

      const mediaType = isPDF ? "application/pdf"
        : files[i].type === "image/jpeg" ? "image/jpeg" : "image/png";

      // ── Prompt selon le mode
      let promptText;
      if (isMenti) {
        // Mode Mentimeter — comportement d'origine
        promptText = isPDF
          ? `Ce PDF contient les résultats d'un quiz Mentimeter (plusieurs slides/pages). Pour CHAQUE question visible, extrais les informations et réponds UNIQUEMENT avec un tableau JSON valide, rien d'autre :
[{"q":"texte question","correct":nb,"total":nb,"taux":pourcentage,"theme":"Thème"}, ...]
Pour "theme", choisis parmi : ${THEMES_CONNUS.join(', ')}. Si aucun ne correspond, propose un thème court.
Si aucune question n'est visible, réponds : []`
          : `C'est une capture d'écran d'un quiz Mentimeter. Extrais ces informations et réponds UNIQUEMENT en JSON valide, rien d'autre :
{"q":"texte exact de la question","correct":nombre_bonnes_réponses,"total":nombre_total_réponses,"taux":pourcentage_entier,"theme":"Thème"}
Pour le champ "theme", choisis le plus approprié parmi : ${THEMES_CONNUS.join(', ')}.
Si aucun ne correspond, propose un thème court en français.
Si tu ne vois pas de question claire, réponds : {"erreur":"non reconnu"}`;
      } else {
        // Mode source libre — prompt générique
        promptText = `Contexte : ${sourceContext.trim()}

Analyse ce ${isPDF?'document':'fichier'} et extrais TOUTES les questions, items évaluatifs, ou données mesurables visibles (quiz, sondage, questionnaire, résultats, scores…).
Pour chaque item, réponds UNIQUEMENT avec un tableau JSON valide, rien d'autre :
[{"q":"intitulé ou question","correct":nombre_corrects_ou_null,"total":nombre_répondants_ou_null,"taux":pourcentage_entier_ou_0,"theme":"catégorie_pertinente"}, ...]

Règles :
- "taux" : si disponible directement, utilise-le. Sinon calcule correct/total*100. Sinon mets 0.
- "correct" et "total" : mets 0 si non applicables ou non visibles.
- "theme" : détermine librement une catégorie pertinente selon le contenu (2-4 mots max).
- Si aucun item exploitable n'est visible, réponds : []`;
      }

      const contentBlock = isPDF
        ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 } }
        : { type:"image",    source:{ type:"base64", media_type: mediaType,          data:b64 } };

      const body = JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: isPDF ? 2000 : 400,
        messages: [{ role:"user", content:[ contentBlock, { type:"text", text:promptText } ] }]
      });

      let resp;
      for (let attempt=1; attempt<=3; attempt++) {
        if (attempt > 1) {
          const delai = 1000 * Math.pow(2, attempt-2);
          setRetryInfo(`Image ${i+1} — tentative ${attempt}/3 (attente ${delai/1000}s…)`);
          await new Promise(r => setTimeout(r, delai));
        }
        resp = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "x-api-key":apiKey,
            "anthropic-version":"2023-06-01",
            "anthropic-dangerous-direct-browser-access":"true",
          },
          body,
        });
        if (resp.status !== 429 && resp.status < 500) break;
        if (attempt === 3) throw new Error(`HTTP ${resp.status} après 3 tentatives`);
      }
      setRetryInfo(null);

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);

      const raw   = data.content?.[0]?.text?.trim() || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      // PDF → tableau de questions / Image → objet unique
      const items = Array.isArray(parsed) ? parsed : [parsed];
      for (const item of items) {
        if (!item || item.erreur) {
          if (item?.erreur) errors.push({ file: files[i].name, motif: item.erreur });
          continue;
        }
        if (!item.q) { errors.push({ file: files[i].name, motif: "JSON incomplet" }); continue; }
        const correct = parseInt(item.correct) || 0;
        const total   = parseInt(item.total)   || 0;
        const taux    = total > 0 ? Math.round(correct / total * 100) : (parseInt(item.taux) || 0);
        const norm = s => s.toLowerCase().replace(/\s+/g,' ').trim();
        const doublon = results.find(r => norm(r.q) === norm(item.q));
        if (doublon) {
          errors.push({ file: files[i].name, motif: `Doublon ignoré : "${item.q.slice(0,40)}"` });
        } else {
          results.push({ id: results.length+1, theme: item.theme||"Général", q: item.q, correct, total, taux });
        }
      }
    } catch(err) {
      errors.push({ file: files[i].name, motif: err.message || "Erreur inconnue" });
      console.warn(`Erreur image ${i+1}:`, err);
    }

    setProgress(i + 1);
  }

  setRetryInfo(null);
  setErrors(errors);
  if (results.length === 0) {
    setStatus("error");
  } else {
    setResults(results);
    setStatus("done");
  }
}

          isEditing
          // ── Mode édition
          ? e('div',{style:{display:"grid",gap:7}},
              inputEd(q.q, ev=>updateQ(q.id,{q:ev.target.value}),
                {placeholder:"Question",style:{width:"100%",fontSize:13}}),
              e('div',{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
                e('label',{style:{fontSize:11,color:"#64748b"}},"Thème"),
                inputEd(q.theme, ev=>updateQ(q.id,{theme:ev.target.value}),
                  {placeholder:"Thème",style:{width:140}}),
                e('label',{style:{fontSize:11,color:"#64748b"}},"Bonnes rép."),
                inputEd(String(q.correct), ev=>updateQ(q.id,{correct:parseInt(ev.target.value)||0}),
                  {type:"number",min:"0",style:{width:64}}),
                e('label',{style:{fontSize:11,color:"#64748b"}},"/ Total"),
                inputEd(String(q.total), ev=>updateQ(q.id,{total:parseInt(ev.target.value)||0}),
                  {type:"number",min:"0",style:{width:64}}),
                e('span',{style:{fontSize:13,fontWeight:800,color:gc(q.taux),minWidth:36}},`${q.taux}%`),
              ),
              e('textarea',{
                value:q.note||"", placeholder:"💬 Note pédagogique…",
                onChange:ev=>updateQ(q.id,{note:ev.target.value}),
                rows:1,
                style:{border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 8px",fontSize:11,
                  fontFamily:"inherit",outline:"none",background:"#f8fafc",width:"100%",resize:"vertical"}
              }),
              e('div',{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
                e('button',{onClick:()=>deleteQ(q.id),style:{
                  background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",
                  borderRadius:7,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"
                }},"🗑 Supprimer"),
                e('button',{onClick:()=>setEditingId(null),style:{
                  background:"#1e40af",color:"#fff",border:"none",
                  borderRadius:7,padding:"4px 14px",fontSize:12,fontWeight:700,cursor:"pointer"
                }},"✓ OK"),
              )
            )
          // ── Mode lecture
          : e('div',{style:{display:"flex",flexDirection:"column",gap:3}},
              e('div',{
                style:{display:"grid",gridTemplateColumns:"1fr 130px 90px 110px 32px",
                  alignItems:"center",gap:10,cursor:"pointer"},
                onClick:()=>setEditingId(q.id), title:"Cliquer pour modifier",
              },
                e('div',{style:{fontSize:13}},q.q),
                e('span',{style:{fontSize:11,fontWeight:600,color:"#6366f1",background:"#eef2ff",
                  borderRadius:6,padding:"2px 8px",textAlign:"center"}},q.theme),
                e('div',{style:{display:"flex",alignItems:"center",gap:6}},
                  e('div',{style:{flex:1,background:"#e2e8f0",borderRadius:4,height:6,overflow:"hidden"}},
                    e('div',{style:{width:`${q.taux}%`,height:"100%",background:gc(q.taux),borderRadius:4}})
                  ),
                  e('span',{style:{fontSize:13,fontWeight:800,color:gc(q.taux),minWidth:34}},`${q.taux}%`)
                ),
                e(Badge,{taux:q.taux}),
                e('button',{
                  onClick:ev=>{ev.stopPropagation();deleteQ(q.id);},
                  style:{background:"none",border:"none",color:"#cbd5e1",fontSize:16,cursor:"pointer",padding:0,lineHeight:1},
                  title:"Supprimer"
                },"✕")
              ),
              q.note && e('div',{style:{fontSize:11,color:"#64748b",fontStyle:"italic",paddingLeft:4}},
                `💬 ${q.note}`)
            )
        );
      })
    )
  ]);

  // ── VUE RADAR
  const vueRadar = panel([
    e('h2',{style:{margin:"0 0 16px",fontSize:14,fontWeight:700}},"Vue radar — compétences par thème"),
    e(ResponsiveContainer,{width:"100%",height:480},
      e(RadarChart,{data:radarData,cx:"50%",cy:"50%",outerRadius:"68%"},
        e(PolarGrid,{stroke:"#e2e8f0"}),
        e(PolarAngleAxis,{dataKey:"subject",tick:{fontSize:11,fill:"#475569"}}),
        e(Radar,{name:"Classe 6D",dataKey:"taux",stroke:"#2563eb",fill:"#3b82f6",fillOpacity:0.22,strokeWidth:2,dot:{r:3,fill:"#2563eb"}}),
        e(Radar,{name:"Objectif 100%",dataKey:"full",stroke:"#e2e8f0",fill:"none",strokeDasharray:"4 3",strokeWidth:1}),
        e(Legend,{wrapperStyle:{fontSize:12}}),
        e(Tooltip,{content:e(CustomTooltip)})
      )
    )
  ]);

  // ── LÉGENDE
  const legende = e('div',{style:{display:"flex",gap:10,marginTop:20,flexWrap:"wrap"}},
    ...([
      ["#16a34a","#f0fdf4",`✅ Acquis`,`≥ ${seuilHaut}%`],
      ["#d97706","#fffbeb",`⚠️ Fragile`,`${seuilBas}–${seuilHaut-1}%`],
      ["#dc2626","#fef2f2",`🔴 À renforcer`,`< ${seuilBas}%`]
    ]).map(([c,bg,l,s]) =>
      e('div',{key:l,style:{background:bg,border:`1px solid ${c}33`,borderRadius:10,padding:"6px 14px",fontSize:12,color:c,fontWeight:600}},
        l, e('span',{style:{fontWeight:400,color:"#64748b"}},` — ${s}`)
      )
    )
  );

  return e('div',{style:{minHeight:"100vh"}},
    // Input caché pour import JSON
    e('input',{
      id:"json-import-input", type:"file", accept:".json,application/json",
      style:{display:"none"},
      onChange: ev => {
        const f = ev.target.files?.[0];
        if (!f) return;
        importJSON(f, {
          onSuccess: data => {
            if (data.atelier)      setAtelier(data.atelier);
            if (data.partenaire)   setPartenaire(data.partenaire);
            if (data.animateur)    setAnimateur(data.animateur);
            if (data.participants) setParticipants(data.participants);
            if (data.dateSession)  setDateSession(data.dateSession);
            if (data.niveauPublic) setNiveauPublic(data.niveauPublic);
            setQuestionsData(data.questions);
            ev.target.value = "";
          }
        });
      }
    }),
    header,

    // ── Panneau seuils personnalisables
    showSeuils && e('div',{style:{
      background:"#1e3a8a",borderBottom:"2px solid #3b82f6",
      padding:"12px 24px",display:"flex",alignItems:"center",gap:20,flexWrap:"wrap",
    }},
      e('span',{style:{fontSize:12,color:"#93c5fd",fontWeight:700}},"⚙️ Seuils de niveau"),
      e('div',{style:{display:"flex",alignItems:"center",gap:8}},
        e('span',{style:{fontSize:11,color:"#fca5a5"}},"🔴 À renforcer < "),
        e('input',{type:"number",min:1,max:seuilHaut-1,value:seuilBas,
          onChange:ev=>setSeuilBas(Math.min(Number(ev.target.value),seuilHaut-1)),
          style:{width:56,padding:"3px 7px",borderRadius:6,border:"1px solid #3b82f6",
            background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:13,fontWeight:700}}),
        e('span',{style:{fontSize:11,color:"#fde68a"}},"% ⚠️ Fragile < "),
        e('input',{type:"number",min:seuilBas+1,max:99,value:seuilHaut,
          onChange:ev=>setSeuilHaut(Math.max(Number(ev.target.value),seuilBas+1)),
          style:{width:56,padding:"3px 7px",borderRadius:6,border:"1px solid #3b82f6",
            background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:13,fontWeight:700}}),
        e('span',{style:{fontSize:11,color:"#86efac"}},"% ✅ Acquis")
      ),
      e('button',{onClick:()=>{setSeuilBas(60);setSeuilHaut(80);},
        style:{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",
          borderRadius:7,color:"#93c5fd",fontSize:11,padding:"4px 10px",cursor:"pointer"}
      },"Réinitialiser")
    ),

    // ── Modale review avant application
    showReview && uploadResults.length>0 && e('div',{
      style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",
        display:"flex",alignItems:"flex-start",justifyContent:"center",
        zIndex:1000,padding:"24px 16px",overflowY:"auto"},
      onClick: ev => { if(ev.target===ev.currentTarget) setShowReview(false); }
    },
      e('div',{style:{background:"#fff",borderRadius:20,padding:24,
        width:"100%",maxWidth:760,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}},
        e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          e('h2',{style:{fontSize:15,fontWeight:800,color:"#1e293b"}},
            `🔍 Vérification — ${uploadResults.length} question(s) analysée(s)`),
          e('button',{onClick:()=>setShowReview(false),
            style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}},"✕")
        ),
        e('div',{style:{maxHeight:400,overflowY:"auto",display:"grid",gap:6,marginBottom:16}},
          ...uploadResults.map((r,i)=>{
            const col=gc(r.taux);
            return e('div',{key:i,style:{
              display:"grid",gridTemplateColumns:"1fr 110px 60px 90px",
              alignItems:"center",gap:8,padding:"8px 10px",
              borderRadius:8,background:i%2===0?"#f8fafc":"#fff",
              border:"1px solid #f1f5f9",
            }},
              e('span',{style:{fontSize:12}},r.q),
              e('span',{style:{fontSize:10,color:"#6366f1",background:"#eef2ff",
                borderRadius:5,padding:"2px 7px",textAlign:"center"}},r.theme),
              e('span',{style:{fontSize:13,fontWeight:800,color:col,textAlign:"center"}},`${r.taux}%`),
              e('span',{style:{fontSize:10,color:col,fontWeight:600}},gl(r.taux).icon+' '+gl(r.taux).label)
            );
          })
        ),
        uploadErrors.length>0 && e('div',{style:{background:"#fff7ed",border:"1px solid #fed7aa",
          borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#9a3412"}},
          `⚠️ ${uploadErrors.length} image(s) ignorée(s) : `+uploadErrors.map(e=>e.file).join(', ')
        ),
        e('div',{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          e('button',{onClick:()=>setShowReview(false),
            style:{background:"#f1f5f9",border:"none",borderRadius:10,
              padding:"9px 18px",fontWeight:600,fontSize:13,cursor:"pointer",color:"#475569"}
          },"Annuler"),
          e('button',{
            onClick:()=>{
              setQuestionsData(uploadResults);
              setShowReview(false); setShowUpload(false);
              setUploadStatus("idle"); setUploadFiles([]); setUploadResults([]); setUploadErrors([]); setUploadProgress(0); setUploadSource("");
            },
            style:{background:"#16a34a",border:"none",borderRadius:10,
              padding:"9px 18px",fontWeight:700,fontSize:13,cursor:"pointer",color:"#fff"}
          },"✅ Appliquer les données")
        )
      )
    ),
    showCompare && sessions.length > 0 && e('div',{
      style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",
        display:"flex",alignItems:"flex-start",justifyContent:"center",
        zIndex:1000,padding:"24px 16px",overflowY:"auto"},
      onClick: ev => { if(ev.target===ev.currentTarget) setShowCompare(false); }
    },
      e('div',{style:{background:"#fff",borderRadius:20,padding:24,
        width:"100%",maxWidth:900,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}},
        e('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
          e('h2',{style:{fontSize:16,fontWeight:800,color:"#1e293b"}},
            `📊 Comparaison — ${sessions.length+1} session(s)`),
          e('div',{style:{display:"flex",gap:8}},
            e('button',{
              onClick:()=>{
                // Ajouter session courante si pas encore dans la liste
                setSessions(prev=>[...prev,{
                  id:Date.now(),
                  label:atelier+(partenaire?` · ${partenaire}`:'')+(dateSession?` (${dateSession})`:''),
                  atelier,partenaire,dateSession,participants,
                  questions:questionsData,score:globalScore(questionsData),themes:byTheme(questionsData),
                }]);
              },
              style:{background:"#1e40af",color:"#fff",border:"none",borderRadius:8,
                padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}
            },"＋ Ajouter session courante"),
            e('button',{onClick:()=>setShowCompare(false),
              style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}},"✕")
          )
        ),
        // Scores globaux
        e('div',{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}},
          ...[...sessions,{
            id:"current",label:atelier+(partenaire?` · ${partenaire}`:''),
            score:globalScore(questionsData),questions:questionsData,themes:byTheme(questionsData),
          }].map((s,si)=>{
            const col=gc(s.score);
            return e('div',{key:s.id,style:{
              flex:1,minWidth:150,background:"#f8fafc",border:`2px solid ${col}33`,
              borderRadius:14,padding:"14px 16px",textAlign:"center",position:"relative",
            }},
              si<sessions.length && e('button',{
                onClick:()=>setSessions(prev=>prev.filter(x=>x.id!==s.id)),
                style:{position:"absolute",top:6,right:8,background:"none",border:"none",
                  color:"#cbd5e1",fontSize:14,cursor:"pointer",lineHeight:1}
              },"✕"),
              e('div',{style:{fontSize:10,color:"#64748b",textTransform:"uppercase",
                letterSpacing:1,marginBottom:6,fontWeight:600}},s.label),
              e('div',{style:{fontSize:36,fontWeight:900,color:col,lineHeight:1}},`${s.score}%`),
              e('div',{style:{fontSize:10,color:"#94a3b8",marginTop:4}},
                `${s.questions.length} questions`)
            );
          })
        ),
        // Barres comparatives par thème
        e('div',{style:{overflowX:"auto"}},
          (() => {
            const allSessions=[...sessions,{
              id:"current",label:atelier,score:globalScore(questionsData),
              questions:questionsData,themes:byTheme(questionsData),
            }];
            const allThemes=[...new Set(allSessions.flatMap(s=>s.themes.map(t=>t.theme)))].sort();
            const COLORS=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2"];
            return e('div',{style:{display:"grid",gap:6}},
              allThemes.map(theme=>
                e('div',{key:theme,style:{display:"grid",
                  gridTemplateColumns:`140px repeat(${allSessions.length},1fr)`,
                  alignItems:"center",gap:6}},
                  e('span',{style:{fontSize:11,color:"#475569",fontWeight:600,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},theme),
                  ...allSessions.map((s,si)=>{
                    const t=s.themes.find(x=>x.theme===theme);
                    const pct=t?t.taux:0;
                    return e('div',{key:s.id,style:{position:"relative",background:"#f1f5f9",
                      borderRadius:6,height:22,overflow:"hidden"}},
                      e('div',{style:{width:`${pct}%`,height:"100%",
                        background:COLORS[si%COLORS.length],borderRadius:6,
                        transition:"width .3s",opacity:0.85}}),
                      e('span',{style:{position:"absolute",right:5,top:"50%",
                        transform:"translateY(-50%)",fontSize:10,fontWeight:700,
                        color:pct>30?"#fff":"#475569"}},pct?`${pct}%`:"—")
                    );
                  })
                )
              )
            );
          })()
        ),
        // Légende sessions
        e('div',{style:{display:"flex",gap:12,flexWrap:"wrap",marginTop:14}},
          ...[...sessions,{id:"current",label:atelier+(partenaire?` · ${partenaire}`:'')}]
            .map((s,si)=>{
              const COLORS=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2"];
              return e('div',{key:s.id,style:{display:"flex",alignItems:"center",gap:5,fontSize:11}},
                e('div',{style:{width:12,height:12,borderRadius:3,background:COLORS[si%COLORS.length],flexShrink:0}}),
                e('span',{style:{color:"#475569"}},s.label+(s.id==="current"?" (courante)":""))
              );
            })
        )
      )
    ),

    // ── MODE PRÉSENTATION
    showPresent && questionsData.length>0 && (() => {
      const sorted = [...questionsData].sort(sortFn);
      const q = sorted[presentIdx];
      const lv = gl(q.taux);
      return e('div',{
        style:{position:"fixed",inset:0,background:"#0f172a",zIndex:2000,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32},
        onKeyDown:ev=>{
          if(ev.key==="ArrowRight"||ev.key==="ArrowDown") setPresentIdx(i=>Math.min(i+1,sorted.length-1));
          if(ev.key==="ArrowLeft"||ev.key==="ArrowUp")   setPresentIdx(i=>Math.max(i-1,0));
          if(ev.key==="Escape") setShowPresent(false);
        },
        tabIndex:0,
        ref:el=>el&&el.focus(),
      },
        // Header présentation
        e('div',{style:{position:"absolute",top:16,left:0,right:0,display:"flex",
          justifyContent:"space-between",alignItems:"center",padding:"0 24px"}},
          e('span',{style:{fontSize:12,color:"#475569"}},"MentiAnalyser · Mode présentation"),
          e('div',{style:{display:"flex",gap:8}},
            e('span',{style:{fontSize:13,color:"#94a3b8"}}),
            e('button',{onClick:()=>setShowPresent(false),
              style:{background:"rgba(255,255,255,0.1)",border:"none",color:"#94a3b8",
                fontSize:20,borderRadius:8,padding:"4px 12px",cursor:"pointer"}},"✕")
          )
        ),
        // Numéro
        e('div',{style:{fontSize:13,color:"#475569",marginBottom:16}},
          `${presentIdx+1} / ${sorted.length}`),
        // Thème
        e('div',{style:{fontSize:13,color:"#6366f1",background:"#1e1b4b",
          borderRadius:8,padding:"4px 14px",marginBottom:24,fontWeight:700}}, q.theme),
        // Question
        e('div',{style:{fontSize:28,fontWeight:800,color:"#f1f5f9",textAlign:"center",
          maxWidth:760,lineHeight:1.4,marginBottom:32}}, q.q),
        // Taux + badge
        e('div',{style:{display:"flex",alignItems:"center",gap:20,marginBottom:24}},
          e('div',{style:{fontSize:72,fontWeight:900,color:gc(q.taux),lineHeight:1}},`${q.taux}%`),
          e('div',{style:{background:lv.bg,color:lv.color,border:`2px solid ${lv.color}44`,
            borderRadius:16,padding:"10px 22px",fontSize:18,fontWeight:700}},
            lv.icon+" "+lv.label)
        ),
        // Détail
        q.total>0 && e('div',{style:{fontSize:16,color:"#64748b"}},
          `${q.correct} bonne(s) réponse(s) sur ${q.total}`),
        // Note
        q.note && e('div',{style:{marginTop:20,background:"rgba(255,255,255,0.05)",
          borderRadius:10,padding:"10px 20px",fontSize:14,color:"#94a3b8",fontStyle:"italic"}},
          `💬 ${q.note}`),
        // Navigation
        e('div',{style:{position:"absolute",bottom:24,left:0,right:0,
          display:"flex",justifyContent:"center",gap:16}},
          e('button',{onClick:()=>setPresentIdx(i=>Math.max(i-1,0)),
            disabled:presentIdx===0,
            style:{background:presentIdx===0?"#1e293b":"#1e40af",color:presentIdx===0?"#475569":"#fff",
              border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,fontWeight:700,
              cursor:presentIdx===0?"not-allowed":"pointer"}},"← Précédent"),
          e('button',{onClick:()=>setPresentIdx(i=>Math.min(i+1,sorted.length-1)),
            disabled:presentIdx===sorted.length-1,
            style:{background:presentIdx===sorted.length-1?"#1e293b":"#1e40af",
              color:presentIdx===sorted.length-1?"#475569":"#fff",
              border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,fontWeight:700,
              cursor:presentIdx===sorted.length-1?"not-allowed":"pointer"}},"Suivant →")
        )
      );
    })(),

    e('div',{style:{padding:"28px 32px",maxWidth:1200,margin:"0 auto"}},
      questionsData.length === 0
      ? e('div',{style:{
          textAlign:"center",padding:"60px 20px",
          background:"#fff",borderRadius:20,
          border:"2px dashed #e2e8f0",marginTop:8,
        }},
          e('div',{style:{fontSize:56,marginBottom:16}},"📊"),
          e('div',{style:{fontSize:20,fontWeight:800,color:"#1e293b",marginBottom:8}},
            "Aucune donnée à afficher"),
          e('div',{style:{fontSize:14,color:"#64748b",marginBottom:24,maxWidth:380,margin:"0 auto 24px"}},
            "Importez vos captures PNG, JPEG, PDF ou une archive ZIP depuis Mentimeter pour commencer l'analyse."),
          e('button',{
            onClick:()=>setShowUpload(true),
            style:{background:"#1e40af",color:"#fff",border:"none",borderRadius:12,
              padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer"}
          },"📤 Importer des fichiers")
        )
      : e('div',null,
          statCards, tabs,
          tab==="themes"    ? vueThemes    :
          tab==="questions" ? vueQuestions :
          vueRadar,
          legende
        )
    )
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

} // end boot()
</script>
</body>
</html>
