// ── CLÉS CHIFFRÉES (ne pas modifier) ─────────────────────────────────────────
const MDP_HASH     = "a13a94b5dafda944c090c6e997f48e290c4b762f9b1b0849f74cd4b4f2bf3712";
const ENCRYPTED_KEY = "Pg5DFQc1QwAcEENWXwNzOBULHDkkWg1ZDBgCFnFgAgQoOSB5PSMBSAVXGm5cNA4LMSJ4NCAFGDU8E3BTASwpJiYlXFIvHzUARVsONQ0AMgZzGwQJCCkCAn5cPyw0PAALDRctVAErQU0OOiQv";

function sha256(str) {
  // SHA-256 via SubtleCrypto (async) — version sync approximative via simple hash
  // On utilise une version déterministe simple pour la vérification MDP
  let hash = 0n;
  for (let i = 0; i < str.length; i++) {
    hash = (hash * 31n + BigInt(str.charCodeAt(i))) & 0xFFFFFFFFFFFFFFFFn;
  }
  return hash.toString(16).padStart(16,'0');
}

async function verifyAndDecrypt(mdp) {
  // Vrai SHA-256 via SubtleCrypto
  const enc = new TextEncoder();
  const hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(mdp));
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hashHex !== MDP_HASH) return null;
  // Déchiffrer la clé XOR
  const raw = atob(ENCRYPTED_KEY);
  let key = '';
  for (let i = 0; i < raw.length; i++) {
    key += String.fromCharCode(raw.charCodeAt(i) ^ mdp.charCodeAt(i % mdp.length));
  }
  return key;
}

const byTheme = () => {
  const map = {};
  questions.forEach(({ theme, correct, total }) => {
    if (!map[theme]) map[theme] = { theme, correct:0, total:0 };
    map[theme].correct += correct;
    map[theme].total   += total;
  });
  return Object.values(map)
    .map(d => ({ ...d, taux: Math.round(d.correct / d.total * 100) }))
    .sort((a, b) => a.taux - b.taux);
};

const globalScore = () => {
  const tot = questions.reduce((a,q) => a + q.total, 0);
  const cor = questions.reduce((a,q) => a + q.correct, 0);
  return Math.round(cor / tot * 100);
};

// ── HELPER RTF : encoder uniquement les vrais caractères Unicode > 127
// Ne touche pas aux chaînes qui contiennent déjà des séquences \'xx
function rtfEncode(str) {
  return String(str).replace(/[^\x00-\x7E]/g, c => {
    const cp = c.charCodeAt(0);
    return cp < 256 ? `\\'${cp.toString(16).padStart(2,'0')}` : '';
  });
}

// ── HELPER RTF : ligne de tableau
// isHeader=true → fond bleu (index couleur 1 = #1e40af) + texte blanc (index 2)
function rtfRow(cells, widths, isHeader=false) {
  let pos = 0;
  const cellDefs = widths.map(w => {
    pos += w;
    // \clcbpat1 = couleur de fond = entrée n°1 de colortbl = bleu
    const shade = isHeader ? '\\clcbpat1' : '';
    return `\\clbrdrt\\brdrw15\\brdrs\\clbrdrl\\brdrw15\\brdrs\\clbrdrb\\brdrw15\\brdrs\\clbrdrr\\brdrw15\\brdrs${shade}\\cellx${pos}`;
  }).join('');
  const cellContents = cells.map(c => {
    const fmt = isHeader ? '\\b\\cf2 ' : '\\cf0 ';
    return `\\pard\\intbl\\sb40\\sa40\\sl276\\slmult1 ${fmt}\\fs20 ${rtfEncode(c)}\\b0\\cell`;
  }).join('\n');
  return `\\trowd\\trgaph108\\trrh-320\n${cellDefs}\n${cellContents}\n\\row\n\\pard`;
}

  const [apiKey,       setApiKey]       = useState("");
  const [mdpStatus,    setMdpStatus]    = useState("idle"); // idle | ok | error

  const themes      = byTheme();
  const score       = globalScore();
  const acquis      = questions.filter(q => q.taux >= 80).length;
  const fragiles    = questions.filter(q => q.taux >= 60 && q.taux < 80).length;
  const areinforcer = questions.filter(q => q.taux <  60).length;
  const filteredQ   = activeTheme ? questions.filter(q => q.theme === activeTheme) : [];
  const radarData   = themes.map(t => ({
    subject: t.theme.length > 13 ? t.theme.slice(0,13)+"…" : t.theme,
    taux: t.taux, full: 100,
  }));

  const e = React.createElement;

  // style champ éditable inline
  const fieldStyle = {
    background: "rgba(255,255,255,0.12)",
    border: "1px solid rgba(255,255,255,0.25)",
    borderRadius: 7,
    color: "#fff",
    fontFamily: "inherit",
    padding: "4px 10px",
    fontSize: 13,
    fontWeight: 600,
    outline: "none",
    width: "100%",
    minWidth: 180,
  };

  const fieldLabel = (txt) => e('div', {
    style:{fontSize:9,color:"#93c5fd",textTransform:"uppercase",letterSpacing:1.5,marginBottom:3}
  }, txt);

  // styles réutilisables
  const panel = (children, extra={}) => e('div', { style:{
    background:"#fff", borderRadius:16, padding:22,
    border:"1px solid #e2e8f0", boxShadow:"0 2px 10px rgba(0,0,0,0.04)",
    ...extra
  }}, ...children);

  // ── HEADER
  const header = e('div', { style:{
    background:"linear-gradient(120deg,#1e3a8a 0%,#2563eb 100%)",
    padding:"20px 32px", display:"flex", justifyContent:"space-between",
    alignItems:"flex-start", flexWrap:"wrap", gap:16,
  }},
    // Gauche : titre fixe + 3 champs éditables
    e('div', { style:{display:"flex", flexDirection:"column", gap:10} },
      e('div', null,
        e('div', { style:{fontSize:10,color:"#93c5fd",letterSpacing:2.5,textTransform:"uppercase",marginBottom:4} },
          "Conseil Départemental du Lot-et-Garonne · MentiAnalyser"),
        e('h1', { style:{color:"#fff",fontSize:20,fontWeight:800,margin:0} }, "Analyse Mentimeter")
      ),
      e('div', { style:{display:"flex", gap:12, flexWrap:"wrap"} },
        // Thème de l'atelier
        e('div', null,
          fieldLabel("Thème de l'atelier"),
          e('input', {
            type:"text", value:atelier,
            onChange: ev => setAtelier(ev.target.value),
            style:{...fieldStyle, minWidth:200},
            placeholder:"Ex: Prudence sur Internet",
          })
        ),
        // Partenaire
        e('div', null,
          fieldLabel("Partenaire / classe"),
          e('input', {
            type:"text", value:partenaire,
            onChange: ev => setPartenaire(ev.target.value),
            style:fieldStyle,
            placeholder:"Ex: Collège Jean Jaurès — 6D",
          })
        ),
        // Animateur
        e('div', null,
          fieldLabel("Animé par"),
          e('input', {
            type:"text", value:animateur,
            onChange: ev => setAnimateur(ev.target.value),
            style:{...fieldStyle, minWidth:160},
            placeholder:"Votre nom",
          })
        ),
        // Participants
        e('div', null,
          fieldLabel("Participants"),
          e('input', {
            type:"number", value:participants,
            onChange: ev => setParticipants(ev.target.value),
            style:{...fieldStyle, minWidth:80, width:80},
            min:"1",
          })
        ),
        // Date
        e('div', null,
          fieldLabel("Date de l'atelier"),
          e('input', {
            type:"text", value:dateSession,
            onChange: ev => setDateSession(ev.target.value),
            style:{...fieldStyle, minWidth:130},
            placeholder:"Ex: 16 mai 2026",
          })
        ),
        // Mot de passe IA
        e('div', null,
          fieldLabel("🔑 Mot de passe IA"),
          e('div', { style:{display:"flex", gap:6, alignItems:"center"} },
            e('input', {
              type:"password", value:mdp,
              onChange: ev => { setMdp(ev.target.value); setMdpStatus("idle"); setApiKey(""); },
              onKeyDown: ev => {
                if (ev.key === "Enter") {
                  verifyAndDecrypt(ev.target.value).then(k => {
                    if (k) { setApiKey(k); setMdpStatus("ok"); }
                    else { setMdpStatus("error"); setApiKey(""); }
                  });
                }
              },
              style:{...fieldStyle, minWidth:160, fontFamily:"monospace"},
              placeholder:"Mot de passe…",
            }),
            e('button', {
              onClick: () => verifyAndDecrypt(mdp).then(k => {
                if (k) { setApiKey(k); setMdpStatus("ok"); }
                else { setMdpStatus("error"); setApiKey(""); }
              }),
              style:{
                background: mdpStatus==="ok"?"#16a34a":mdpStatus==="error"?"#dc2626":"rgba(255,255,255,0.2)",
                border:"none", borderRadius:7, color:"#fff",
                padding:"5px 12px", fontWeight:700, fontSize:13, cursor:"pointer",
                whiteSpace:"nowrap",
              }
            }, mdpStatus==="ok" ? "✅ OK" : mdpStatus==="error" ? "❌" : "→")
          )
        ),
      ),
      e('div', { style:{color:"#bfdbfe",fontSize:12,marginTop:2} },
        `${questions.length} questions · 23 élèves · Cliquer pour modifier les champs`)
    ),
    // Droite : boutons export
    e('div', { style:{display:"flex",gap:10,flexWrap:"wrap",alignSelf:"center"} },
      e('button', {
        onClick: () => exportHTM(atelier, partenaire, animateur, participants, dateSession),
        style:{ background:"#fff",color:"#1e40af",border:"none",borderRadius:10,
          padding:"10px 18px",fontWeight:700,fontSize:13,
          display:"flex",alignItems:"center",gap:7,
          boxShadow:"0 2px 10px rgba(0,0,0,0.18)" }
      }, "📄 Export Word (RTF)"),
      e('button', {
        onClick: () => exportSynthese(atelier, partenaire, animateur, participants, dateSession, apiKey),
        disabled: !apiKey,
        title: apiKey ? "" : "Entrez votre clé API pour activer",
        style:{
          background: apiKey ? "#7c3aed" : "#94a3b8",
          color:"#fff",
          border:"none", borderRadius:10,
          padding:"10px 18px", fontWeight:700, fontSize:13,
          display:"flex", alignItems:"center", gap:7,
          boxShadow: apiKey ? "0 2px 10px rgba(0,0,0,0.2)" : "none",
          cursor: apiKey ? "pointer" : "not-allowed",
          transition:"background .2s",
        }
      }, "📝 Export Synthèse (IA)")
    )
  );

  // ── STAT CARDS
  const statCards = e('div', { style:{
    display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(165px,1fr))",
    gap:12, marginBottom:24,
  }},
    e(StatCard,{label:"Score global",  value:`${score}%`,  sub:"moyenne de la classe",                              accent:getColor(score)}),
    e(StatCard,{label:"Acquis",         value:acquis,        sub:`≥ 80% · ${Math.round(acquis/questions.length*100)}% des questions`, accent:"#22c55e"}),
    e(StatCard,{label:"Fragiles",       value:fragiles,      sub:"60–79% de réussite",                               accent:"#f59e0b"}),
    e(StatCard,{label:"À renforcer",    value:areinforcer,   sub:"< 60% de réussite",                                accent:"#ef4444"}),
    e(StatCard,{label:"Thèmes",         value:themes.length, sub:"domaines évalués",                                 accent:"#6366f1"}),
  );

  // ── TABS
  const tabs = e('div', { style:{
    display:"flex", gap:3, marginBottom:20,
    background:"#e2e8f0", borderRadius:12, padding:4, width:"fit-content",
  }},
    ...([["themes","Par thème"],["questions","Par question"],["radar","Radar"]]).map(([key,lbl]) =>
      e('button', { key, onClick:()=>setTab(key), style:{
        background: tab===key?"#fff":"transparent",
        border:"none", borderRadius:9,
        padding:"8px 18px", fontWeight:700, fontSize:13,
        color: tab===key?"#1e40af":"#64748b",
        boxShadow: tab===key?"0 1px 5px rgba(0,0,0,0.09)":"none",
        transition:"all .15s",
      }}, lbl)
    )
  );

  // ── VUE THÈMES
  const vueThemes = e('div', { style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20} },
    // Graphe
    panel([
      e('h2',{style:{margin:"0 0 16px",fontSize:14,fontWeight:700}},"Taux de réussite par thème"),
      e(ResponsiveContainer,{width:"100%",height:370},
        e(BarChart,{
          data:themes, layout:"vertical",
          margin:{left:4,right:36,top:0,bottom:0},
          barCategoryGap:"18%",
          onClick: d => {
            const t = d?.activePayload?.[0]?.payload?.theme;
            if(t) setActiveTheme(prev => prev===t ? null : t);
          }
        },
          e(CartesianGrid,{strokeDasharray:"3 3",horizontal:false,stroke:"#f1f5f9"}),
          e(XAxis,{type:"number",domain:[0,100],tickFormatter:v=>`${v}%`,tick:{fontSize:11,fill:"#94a3b8"},axisLine:false,tickLine:false}),
          e(YAxis,{type:"category",dataKey:"theme",width:112,tick:{fontSize:11,fill:"#475569"},axisLine:false,tickLine:false}),
          e(Tooltip,{content:e(CustomTooltip),cursor:{fill:"rgba(30,64,175,0.04)"}}),
          e(Bar,{dataKey:"taux",name:"Réussite",radius:[0,6,6,0]},
            ...themes.map((t,i) => e(Cell,{
              key:i,
              fill: activeTheme===t.theme ? "#1e40af" : getColor(t.taux),
              opacity: activeTheme && activeTheme!==t.theme ? 0.3 : 1,
              style:{cursor:"pointer"},
            }))
          )
        )
      ),
      e('p',{style:{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:8}},
        "Cliquer sur une barre pour filtrer les questions")
    ]),
    // Tableau
    panel([
      e('h2',{style:{margin:"0 0 14px",fontSize:14,fontWeight:700}},"Tableau par thème"),
      e('table',{style:{width:"100%",borderCollapse:"collapse"}},
        e('thead',null,
          e('tr',{style:{background:"#f8fafc"}},
            ...["Thème","Rép.","Taux","Niveau"].map(h =>
              e('th',{key:h,style:{padding:"7px 10px",textAlign:"left",fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,borderBottom:"2px solid #e2e8f0"}},h)
            )
          )
        ),
        e('tbody',null,
          ...themes.map((t,i) =>
            e('tr',{
              key:i,
              onClick:()=>setActiveTheme(prev=>prev===t.theme?null:t.theme),
              style:{
                cursor:"pointer",
                background: activeTheme===t.theme?"#eff6ff":i%2===0?"#fff":"#fafafa",
                transition:"background .1s",
              }
            },
              e('td',{style:{padding:"8px 10px",fontSize:13,fontWeight:600,color:activeTheme===t.theme?"#1e40af":"#1e293b"}},t.theme),
              e('td',{style:{padding:"8px 10px",fontSize:12,color:"#475569"}},`${t.correct}/${t.total}`),
              e('td',{style:{padding:"8px 10px",fontSize:14,fontWeight:800,color:getColor(t.taux)}},`${t.taux}%`),
              e('td',{style:{padding:"8px 10px"}},e(Badge,{taux:t.taux}))
            )
          )
        )
      )
    ],{overflowY:"auto",maxHeight:450}),
    // Panneau questions filtrées
    activeTheme && e('div',{style:{
      gridColumn:"1/-1",background:"#eff6ff",borderRadius:16,
      padding:20,border:"1px solid #bfdbfe",
    }},
      e('h3',{style:{color:"#1e40af",fontSize:14,marginBottom:12}},
        `Questions — ${activeTheme} (${filteredQ.length})`),
      e('div',{style:{display:"grid",gap:7}},
        ...[...filteredQ].sort((a,b)=>a.taux-b.taux).map(q =>
          e('div',{key:q.id,style:{
            background:"#fff",borderRadius:10,padding:"10px 14px",
            border:"1px solid #dbeafe",
            display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,
          }},
            e('span',{style:{fontSize:13,flex:1}},q.q),
            e('div',{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
              e('span',{style:{fontSize:12,color:"#64748b"}},`${q.correct}/${q.total}`),
              e('span',{style:{fontSize:14,fontWeight:800,color:getColor(q.taux),minWidth:36,textAlign:"right"}},`${q.taux}%`),
              e(Badge,{taux:q.taux})
            )
          )
        )
      )
    )
  );

  // ── VUE QUESTIONS
  const vueQuestions = panel([
    e('h2',{style:{margin:"0 0 16px",fontSize:14,fontWeight:700}},"Toutes les questions — tri par taux croissant"),
    e('div',{style:{display:"grid",gap:4}},
      ...[...questions].sort((a,b)=>a.taux-b.taux).map(q =>
        e('div',{key:q.id,style:{
          display:"grid",gridTemplateColumns:"1fr 130px 90px 130px",
          alignItems:"center",gap:10,
          padding:"9px 12px",borderRadius:10,
          background:"#fafafa",border:"1px solid #f1f5f9",
        }},
          e('div',{style:{fontSize:13}},q.q),
          e('span',{style:{fontSize:11,fontWeight:600,color:"#6366f1",background:"#eef2ff",borderRadius:6,padding:"2px 8px",textAlign:"center"}},q.theme),
          e('div',{style:{display:"flex",alignItems:"center",gap:6}},
            e('div',{style:{flex:1,background:"#e2e8f0",borderRadius:4,height:6,overflow:"hidden"}},
              e('div',{style:{width:`${q.taux}%`,height:"100%",background:getColor(q.taux),borderRadius:4}})
            ),
            e('span',{style:{fontSize:13,fontWeight:800,color:getColor(q.taux),minWidth:34}},`${q.taux}%`)
          ),
          e(Badge,{taux:q.taux})
        )
      )
    )
  ]);

  // ── VUE RADAR
  const vueRadar = panel([
    e('h2',{style:{margin:"0 0 16px",fontSize:14,fontWeight:700}},"Vue radar — compétences par thème"),
    e(ResponsiveContainer,{width:"100%",height:480},
      e(RadarChart,{data:radarData,cx:"50%",cy:"50%",outerRadius:"68%"},
        e(PolarGrid,{stroke:"#e2e8f0"}),
        e(PolarAngleAxis,{dataKey:"subject",tick:{fontSize:11,fill:"#475569"}}),
        e(Radar,{name:"Classe 6D",dataKey:"taux",stroke:"#2563eb",fill:"#3b82f6",fillOpacity:0.22,strokeWidth:2,dot:{r:3,fill:"#2563eb"}}),
        e(Radar,{name:"Objectif 100%",dataKey:"full",stroke:"#e2e8f0",fill:"none",strokeDasharray:"4 3",strokeWidth:1}),
        e(Legend,{wrapperStyle:{fontSize:12}}),
        e(Tooltip,{content:e(CustomTooltip)})
      )
    )
  ]);

  // ── LÉGENDE
  const legende = e('div',{style:{display:"flex",gap:10,marginTop:20,flexWrap:"wrap"}},
    ...([["#16a34a","#f0fdf4","✅ Acquis","≥ 80%"],["#d97706","#fffbeb","⚠️ Fragile","60–79%"],["#dc2626","#fef2f2","🔴 À renforcer","< 60%"]]).map(([c,bg,l,s]) =>
      e('div',{key:l,style:{background:bg,border:`1px solid ${c}33`,borderRadius:10,padding:"6px 14px",fontSize:12,color:c,fontWeight:600}},
        l, e('span',{style:{fontWeight:400,color:"#64748b"}},` — ${s}`)
      )
    )
  );

  return e('div',{style:{minHeight:"100vh"}},
    header,
    e('div',{style:{padding:"28px 32px",maxWidth:1200,margin:"0 auto"}},
      statCards, tabs,
      tab==="themes"    ? vueThemes    :
      tab==="questions" ? vueQuestions :
      vueRadar,
      legende
    )
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

} // end boot()
</script>
</body>
</html>
